  <g transform="translate(486 158)">
    <rect width="596" height="482" rx="12" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.10)"/>
    <text x="34" y="48" fill="#f6f0df" font-family="Inter, Arial, sans-serif" font-size="22">Morning Reset</text>
    <text x="34" y="76" fill="#8bd4ff" font-family="Inter, Arial, sans-serif" font-size="13">2026-06-01 · Harbor Studio</text>
    <rect x="34" y="108" width="528" height="292" rx="10" fill="rgba(7,10,17,0.58)" stroke="rgba(255,255,255,0.08)"/>
    <text x="58" y="150" fill="#eef4ff" font-family="Georgia, serif" font-size="21">I opened the window before the first meeting</text>
    <text x="58" y="182" fill="#eef4ff" font-family="Georgia, serif" font-size="21">and let the room cool down.</text>
    <text x="58" y="236" fill="#c5d0e0" font-family="Georgia, serif" font-size="18">The small reset helped me write the project notes</text>
    <text x="58" y="266" fill="#c5d0e0" font-family="Georgia, serif" font-size="18">with a steadier voice.</text>
    <text x="58" y="330" fill="#f3d48b" font-family="Georgia, serif" font-size="18">Pattern: name the one thing that would make</text>
    <text x="58" y="358" fill="#f3d48b" font-family="Georgia, serif" font-size="18">the evening feel uncluttered.</text>
    <rect x="34" y="424" width="140" height="38" rx="19" fill="url(#gold)"/>
    <text x="78" y="448" fill="#151006" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">保存</text>
    <rect x="190" y="424" width="160" height="38" rx="19" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)"/>
    <text x="226" y="448" fill="#dce9f8" font-family="Inter, Arial, sans-serif" font-size="14">AI+ 元数据</text>
