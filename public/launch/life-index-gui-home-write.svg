  <g transform="translate(118 158)">
    <rect width="332" height="482" rx="12" fill="rgba(255,255,255,0.055)" stroke="rgba(255,255,255,0.09)"/>
    <text x="28" y="46" fill="#f3d48b" font-family="Georgia, serif" font-size="28">人生索引</text>
    <text x="28" y="78" fill="#aab3c5" font-family="Inter, Arial, sans-serif" font-size="14">Morning Reset · 2026-06-01</text>
    <rect x="28" y="112" width="276" height="64" rx="10" fill="rgba(139,212,255,0.08)" stroke="rgba(139,212,255,0.20)"/>
    <text x="48" y="139" fill="#dce9f8" font-family="Inter, Arial, sans-serif" font-size="14">mood: calm</text>
    <text x="48" y="161" fill="#91a4bf" font-family="Inter, Arial, sans-serif" font-size="12">tags: reflection · routine · studio</text>
    <rect x="28" y="206" width="276" height="1" fill="rgba(255,255,255,0.09)"/>
    <text x="28" y="246" fill="#f6f0df" font-family="Inter, Arial, sans-serif" font-size="17">Today’s thread</text>
    <text x="28" y="278" fill="#aab3c5" font-family="Inter, Arial, sans-serif" font-size="13">One observation</text>
    <text x="28" y="310" fill="#aab3c5" font-family="Inter, Arial, sans-serif" font-size="13">One next question</text>
    <text x="28" y="342" fill="#aab3c5" font-family="Inter, Arial, sans-serif" font-size="13">One clean closing note</text>
