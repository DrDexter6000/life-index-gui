<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Life Index GUI home and writing demo screenshot</title>
  <desc id="desc">Sanitized demo screenshot showing the Life Index GUI writing surface with fictional journal text.</desc>
  <defs>
    <radialGradient id="sky" cx="50%" cy="8%" r="90%">
      <stop offset="0" stop-color="#26364f"/>
      <stop offset="0.5" stop-color="#111827"/>
      <stop offset="1" stop-color="#070a11"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" x2="1">
      <stop offset="0" stop-color="#f3d48b"/>
      <stop offset="1" stop-color="#a98f55"/>
    </linearGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="760" fill="url(#sky)"/>
  <g opacity="0.45">
    <circle cx="180" cy="128" r="1.5" fill="#fff"/>
    <circle cx="322" cy="92" r="1.2" fill="#fff"/>
    <circle cx="574" cy="146" r="1.4" fill="#fff"/>
    <circle cx="827" cy="86" r="1.1" fill="#fff"/>
    <circle cx="1045" cy="154" r="1.5" fill="#fff"/>
    <path d="M170 170 C360 40 540 54 694 182 S1010 303 1112 136" fill="none" stroke="#8bd4ff" stroke-width="1.2" opacity="0.35"/>
    <path d="M88 630 C280 530 470 552 620 650 S916 726 1095 570" fill="none" stroke="#f3d48b" stroke-width="1.1" opacity="0.24"/>
  </g>
  <rect x="64" y="52" width="1072" height="656" rx="18" fill="#0c111b" opacity="0.88" stroke="rgba(255,255,255,0.10)"/>
  <g transform="translate(96 84)">
    <circle cx="20" cy="20" r="15" fill="none" stroke="#c9b07f" opacity="0.38"/>
    <circle cx="20" cy="20" r="6" fill="#f3d48b" filter="url(#softGlow)"/>
    <text x="48" y="26" fill="#f6f0df" font-family="Inter, Arial, sans-serif" font-size="20" letter-spacing="4">LIFE INDEX</text>
    <g transform="translate(620 0)" font-family="Inter, Arial, sans-serif" font-size="13">
      <rect x="0" y="0" width="86" height="36" rx="18" fill="rgba(243,212,139,0.13)" stroke="rgba(243,212,139,0.35)"/>
      <text x="24" y="23" fill="#f3d48b">写入</text>
      <rect x="98" y="0" width="88" height="36" rx="18" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)"/>
      <text x="122" y="23" fill="#aab3c5">搜索</text>
      <rect x="198" y="0" width="96" height="36" rx="18" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)"/>
      <text x="222" y="23" fill="#aab3c5">AI+</text>
    </g>
